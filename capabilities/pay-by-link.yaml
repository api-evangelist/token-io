naftiko: 1.0.0-alpha2
info:
  label: Token.io Pay by Link
  description: 'Token.io Open Banking API — Pay by Link. Create, list, and manage reusable payment URLs with
    usage and amount limits for shareable A2A checkout. Self-contained Naftiko capability covering one Token.io
    business surface.'
  tags:
  - Token.io
  - Pay by Link
  - Checkout
  - Payments
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    TOKEN_IO_JWT: TOKEN_IO_JWT
capability:
  consumes:
  - type: http
    namespace: pay-by-link
    baseUri: https://api.token.io
    description: Token.io Pay by Link business capability. Self-contained, no shared references.
    resources:
    - name: payment-links
      path: /payment-links
      operations:
      - name: createpaymentlink
        method: POST
        description: Create a new reusable payment link.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: listpaymentlinks
        method: GET
        description: List existing payment links.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-link
      path: /payment-links/{linkId}
      operations:
      - name: getpaymentlink
        method: GET
        description: Retrieve a payment link.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: linkId
          in: path
          type: string
          required: true
      - name: deletepaymentlink
        method: DELETE
        description: Deactivate a payment link.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: linkId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
