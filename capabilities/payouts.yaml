naftiko: 1.0.0-alpha2
info:
  label: Token.io Payouts
  description: 'Token.io Open Banking API — Payouts. Execute outbound transfers from settlement accounts to
    beneficiary accounts and monitor payout lifecycle. Self-contained Naftiko capability covering one Token.io
    business surface.'
  tags:
  - Token.io
  - Payouts
  - Open Banking
  - Disbursements
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    TOKEN_IO_JWT: TOKEN_IO_JWT
capability:
  consumes:
  - type: http
    namespace: payouts
    baseUri: https://api.token.io
    description: Token.io Payouts business capability. Self-contained, no shared references.
    resources:
    - name: payouts
      path: /payouts
      operations:
      - name: initiatepayout
        method: POST
        description: Initiate a payout from a settlement account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: listpayouts
        method: GET
        description: List payouts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payout
      path: /payouts/{payoutId}
      operations:
      - name: getpayout
        method: GET
        description: Retrieve a single payout by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payoutId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
